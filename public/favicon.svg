<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a0f1e"/>
  <!-- Snowflake arms -->
  <g stroke="#00d4ff" stroke-width="5" stroke-linecap="round">
    <!-- Center vertical -->
    <line x1="50" y1="8" x2="50" y2="92"/>
    <!-- Center horizontal -->
    <line x1="8" y1="50" x2="92" y2="50"/>
    <!-- Diagonal 1 -->
    <line x1="20" y1="20" x2="80" y2="80"/>
    <!-- Diagonal 2 -->
    <line x1="80" y1="20" x2="20" y2="80"/>
    <!-- Top arm ticks -->
    <line x1="38" y1="22" x2="50" y2="34"/>
    <line x1="62" y1="22" x2="50" y2="34"/>
    <!-- Bottom arm ticks -->
    <line x1="38" y1="78" x2="50" y2="66"/>
    <line x1="62" y1="78" x2="50" y2="66"/>
    <!-- Left arm ticks -->
    <line x1="22" y1="38" x2="34" y2="50"/>
    <line x1="22" y1="62" x2="34" y2="50"/>
    <!-- Right arm ticks -->
    <line x1="78" y1="38" x2="66" y2="50"/>
    <line x1="78" y1="62" x2="66" y2="50"/>
  </g>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#00d4ff"/>
</svg>
